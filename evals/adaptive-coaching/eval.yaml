name: adaptive-coaching-eval
description: Quality suite for autonomy-preserving adaptive-challenge coaching.
skill: adaptive-coaching
version: "0.1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: coaching_quality
    weight: 1.0
    threshold: 0.8
    description: Coaching classifies technical versus adaptive work and corrects the adaptive gap with a prosthesis-building AskUserQuestion quiz.
tasks:
  - "tasks/*.yaml"

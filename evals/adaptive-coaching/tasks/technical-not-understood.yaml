id: adaptive-coaching-technical-not-understood
name: Misunderstood Technical Challenge
description: Coaches a recurring technical misunderstanding instead of only re-handing the fix.
tags:
  - quality
  - classification
inputs:
  prompt: |
    Use adaptive-coaching. Can we reflect on why I keep needing this same caching fix? I want to actually understand it.

    Context:
    - For five sessions the person re-requested the identical fix without grasping why it works, and keeps reintroducing the bug.
    - The technical answer is known, but it is not understood; the local store reports ready.
expected:
  output_contains:
    - "Classification"
    - "Capability Gap"
    - "AskUserQuestion"
    - "Next Move"
  output_not_contains:
    - "here is the fix again"

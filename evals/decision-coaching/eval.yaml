name: decision-coaching-eval
description: Quality suite for autonomy-preserving decision coaching.
skill: decision-coaching
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: coaching_quality
    weight: 1.0
    threshold: 0.8
    description: Coaching asks a focused portable question handoff with choices and avoids rubber-stamp agreement.
tasks:
  - "tasks/*.yaml"

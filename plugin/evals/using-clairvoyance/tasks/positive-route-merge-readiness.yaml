id: using-clairvoyance-positive-route-merge-readiness
name: Positive Route - Merge Readiness
description: The bootstrap should choose the review-verdict skill for merge readiness.
tags:
  - recall
  - routing
inputs:
  prompt: |
    Which single Clairvoyance skill should be loaded before answering?
    Return only the skill name.

    Scenario:
    The human asks whether a PR should merge after unit tests passed but no end-to-end path was exercised.
expected:

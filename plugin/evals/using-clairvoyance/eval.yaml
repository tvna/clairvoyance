name: using-clairvoyance-eval
description: Trigger behavior suite for the Clairvoyance bootstrap skill.
skill: using-clairvoyance
version: "1.0.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: trigger_precision_recall
    weight: 1.0
    threshold: 0.8
    description: Recall and precision for agent-to-human handoff detection.
tasks:
  - "tasks/*.yaml"

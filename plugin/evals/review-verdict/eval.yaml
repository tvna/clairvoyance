name: review-verdict-eval
description: Quality suite for the Clairvoyance review verdict skill.
skill: review-verdict
version: "1.0.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: review_verdict_quality
    weight: 1.0
    threshold: 0.8
    description: Review verdict includes evidence, system context, risk, and next move.
tasks:
  - "tasks/*.yaml"

name: session-handoff-eval
description: Quality suite for paste-ready next-session handoff prompts.
skill: session-handoff
version: "1.0.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4.6
metrics:
  - name: handoff_quality
    weight: 1.0
    threshold: 0.8
    description: Handoff is a self-contained, paste-ready prompt with context, files, implementation, verification, and acceptance criteria.
tasks:
  - "tasks/*.yaml"

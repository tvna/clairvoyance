name: Bug report
description: A skill, hook, eval, or workflow behaves incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. Keep it specific and reproducible.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - using-clairvoyance
        - clairvoyance
        - review-verdict
        - architecture-tradeoff
        - decision-coaching
        - human-harness
        - hooks
        - evals
        - release / CI
        - other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: The observed behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include the prompt or handoff and any context the agent was given.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: 1.0.0
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Claude Code version, and (if eval-related) the waza version.

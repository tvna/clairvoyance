name: Sync agent instructions

on:
  schedule:
    - cron: "0 6 * * 1"  # weekly; adjust as needed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  MASTER_REPO: tvna/claude-md
  # No pinned tag: always track the upstream's latest published release.
  # The supply-chain risk of pulling an unreviewed upstream bump is an
  # accepted project decision; assets are still SHA-verified against the
  # release's own SHA256SUMS manifest before anything is committed.

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Recommended: restrict egress to the GitHub download hosts.
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout consumer repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Fetch and verify release assets
        id: fetch
        env:
          MASTER_REPO: ${{ env.MASTER_REPO }}
        run: |
          set -euo pipefail
          # Resolve the latest published (non-draft, non-prerelease) release tag
          # once, then download every asset by that exact tag so the manifest and
          # the payloads come from a single, consistent release.
          tag="$(curl -fsSL "https://api.github.com/repos/${MASTER_REPO}/releases/latest" | jq -r '.tag_name')"
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "could not resolve latest release tag for ${MASTER_REPO}" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          base="https://github.com/${MASTER_REPO}/releases/download/${tag}"
          tmp="$(mktemp -d)"
          for f in AGENTS.md CLAUDE.md SHA256SUMS; do
            curl -fsSL "${base}/${f}" -o "${tmp}/${f}"
          done
          # Verify every payload file against the release manifest. A mismatch
          # exits non-zero and the job fails before anything is committed.
          ( cd "$tmp" && sha256sum -c SHA256SUMS )
          # Land the verified files as committed real files (no symlink).
          # No-delta layout: write to the repository root.
          cp "${tmp}/AGENTS.md" AGENTS.md
          cp "${tmp}/CLAUDE.md" CLAUDE.md
          rm -rf "$tmp"

      - name: Open a pull request on change
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          branch: chore/sync-claude-md
          title: "chore: sync agent instructions from tvna/claude-md"
          commit-message: "chore: sync agent instructions (${{ steps.fetch.outputs.tag }})"
          body: |
            Syncs AGENTS.md and CLAUDE.md from ${{ env.MASTER_REPO }}
            latest release ${{ steps.fetch.outputs.tag }}, verified against SHA256SUMS.

            Review and merge behind the code-owner gate. Do not auto-merge.
          labels: instructions-sync

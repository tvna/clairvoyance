name: Sync agent instructions

on:
  schedule:
    - cron: "0 6 * * 1"  # weekly; adjust as needed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  MASTER_REPO: tvna/claude-md
  # Upstream delivers the compiled instruction files as raw blobs on its default
  # branch -- there is no GitHub Release and no version tag (one is planned, not
  # yet present). The sync tracks the latest commit on that branch. Pulling an
  # unreviewed upstream change is an accepted project trade-off.

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Recommended: restrict egress to api.github.com and raw.githubusercontent.com.
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout consumer repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Fetch upstream instruction files
        id: fetch
        env:
          MASTER_REPO: ${{ env.MASTER_REPO }}
        run: |
          set -euo pipefail
          # Resolve the default branch head once, then fetch every file pinned to
          # that exact commit, so all files come from one consistent upstream
          # revision even if the branch advances mid-run. Branch delivery ships no
          # SHA256SUMS manifest; the commit pin is the consistency guarantee.
          branch="$(curl -fsSL "https://api.github.com/repos/${MASTER_REPO}" | jq -r '.default_branch')"
          sha="$(curl -fsSL "https://api.github.com/repos/${MASTER_REPO}/commits/${branch}" | jq -r '.sha')"
          if [ -z "$sha" ] || [ "$sha" = "null" ]; then
            echo "could not resolve ${MASTER_REPO}@${branch} head commit" >&2
            exit 1
          fi
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${sha:0:12}" >> "$GITHUB_OUTPUT"
          base="https://raw.githubusercontent.com/${MASTER_REPO}/${sha}"
          tmp="$(mktemp -d)"
          for f in AGENTS.md CLAUDE.md; do
            curl -fsSL "${base}/${f}" -o "${tmp}/${f}"
          done
          # Land the fetched files as committed real files (no symlink).
          # No-delta layout: write to the repository root.
          cp "${tmp}/AGENTS.md" AGENTS.md
          cp "${tmp}/CLAUDE.md" CLAUDE.md
          rm -rf "$tmp"

      - name: Open a pull request on change
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v8.1.1
        with:
          branch: chore/sync-claude-md
          title: "chore: sync agent instructions from tvna/claude-md"
          commit-message: "chore: sync agent instructions (${{ steps.fetch.outputs.short_sha }})"
          body: |
            Syncs AGENTS.md and CLAUDE.md from ${{ env.MASTER_REPO }}
            at commit ${{ steps.fetch.outputs.sha }} (latest on the default branch).

            Review and merge behind the code-owner gate. Do not auto-merge.
          labels: instructions-sync

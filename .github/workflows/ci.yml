name: CI

# Static validation that runs without any LLM/eval backend. Guards JSON
# manifests and hook script integrity including the cross-platform run-hook entry
# point. The version is owned by the git tag and written into plugin.json at
# release time (see docs/versioning.md), so there is no in-repo version drift to
# check here.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Validate JSON files
        run: |
          set -euo pipefail
          files=(
            plugin/.claude-plugin/plugin.json
            plugin/.codex-plugin/plugin.json
            .claude-plugin/marketplace.json
            .agents/plugins/marketplace.json
            plugin/hooks/hooks.json
            plugin/hooks/codex-hooks.json
            .releaserc.json
          )
          for f in "${files[@]}"; do
            python3 -m json.tool "$f" > /dev/null
            echo "ok: $f"
          done

      - name: Check marketplace carries no version
        # The git tag / plugin.json own the version (see docs/versioning.md);
        # marketplace.json must carry none, or Claude Code silently prefers
        # plugin.json and masks a stale marketplace value. Drift gate for that
        # single-source-of-truth invariant.
        run: >
          python3 -c "import json,sys;
          d=json.load(open('.claude-plugin/marketplace.json'));
          bad=[p.get('name','?') for p in d['plugins'] if 'version' in p];
          sys.exit('marketplace.json must not carry a version: '+', '.join(bad)) if bad else print('ok: marketplace.json carries no version')"

      - name: Check Claude and Codex manifests carry the same version
        # apply_version.mjs writes the release version into both manifests; a
        # rename or a hand edit could drift them and ship a stale version to one
        # runtime. Guard the single-source-of-truth invariant across both.
        run: >
          python3 -c "import json,sys;
          c=json.load(open('plugin/.claude-plugin/plugin.json'))['version'];
          x=json.load(open('plugin/.codex-plugin/plugin.json'))['version'];
          sys.exit(f'manifest version drift: claude={c} codex={x}') if c!=x else print(f'ok: both manifests at {c}')"

      - name: Validate hook scripts
        run: bash scripts/check_hooks.sh

      - name: Check skill best practices
        run: python3 scripts/check_skills.py

      - name: Check skill coverage (eval + doc, no orphans)
        run: python3 scripts/check_coverage.py

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # Tokenless OIDC upload to Codecov (codecov-action use_oidc). The coverage
      # gate stays local (pytest --cov-fail-under in pyproject.toml); Codecov is
      # informational only, so a failed upload never blocks CI.
      id-token: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Lint with ruff
        run: |
          uv run --frozen ruff check --output-format=github
          uv run --frozen ruff format --check

      - name: Type-check with mypy
        run: uv run --frozen mypy

      - name: Run script tests with coverage
        # pyproject's addopts already carry --cov and --cov-fail-under=100 (the
        # authoritative gate); add machine-readable reports for the Codecov
        # uploads below.
        run: uv run --frozen pytest --cov-report=xml --junitxml=junit.xml -o junit_family=legacy

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: ./coverage.xml
          flags: scripts
          fail_ci_if_error: false
          use_oidc: true

      - name: Upload test results to Codecov
        if: always()
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3  # v1.2.1
        with:
          files: ./junit.xml
          disable_search: true
          fail_ci_if_error: false
          use_oidc: true

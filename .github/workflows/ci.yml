name: CI

# Static validation that runs without any LLM/eval backend. Guards JSON
# manifests and hook script integrity including the cross-platform run-hook entry
# point. The version is owned by the git tag and written into plugin.json at
# release time (see docs/versioning.md), so there is no in-repo version drift to
# check here.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Validate JSON files
        run: |
          set -euo pipefail
          files=(
            plugin/.claude-plugin/plugin.json
            .claude-plugin/marketplace.json
            plugin/hooks/hooks.json
            .releaserc.json
          )
          for f in "${files[@]}"; do
            python3 -m json.tool "$f" > /dev/null
            echo "ok: $f"
          done

      - name: Validate hook scripts
        run: bash scripts/check_hooks.sh

      - name: Check skill best practices
        run: python3 scripts/check_skills.py

      - name: Check skill coverage (eval + doc, no orphans)
        run: python3 scripts/check_coverage.py

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Lint with ruff
        run: |
          uv run --frozen ruff check --output-format=github
          uv run --frozen ruff format --check

      - name: Type-check with mypy
        run: uv run --frozen mypy

      - name: Run script tests with coverage
        run: uv run --frozen pytest

name: Release

# Semantic versioning via semantic-release; the git tag is the single source of
# truth. The full release flow and required setup live in docs/versioning.md.
#
# Cadence is intentional, not per-merge: a weekly schedule cuts the release, and
# workflow_dispatch allows an ad-hoc release between weeks. Plain pushes to main
# never release.

on:
  schedule:
    # Mondays at 01:17 UTC (~10:17 JST). Off-minute by GitHub's own guidance.
    - cron: "17 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # Full history + tags so semantic-release can find the last tag and the
          # commits since it. persist-credentials so @semantic-release/git can push
          # the release commit. A PAT/App token (RELEASE_TOKEN) is required to push
          # past the main ruleset and to trigger the required checks; it falls back
          # to GITHUB_TOKEN (release will fail to push to a protected main).
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        # Versions pinned by major. semantic-release runs on the runner's
        # preinstalled Node; no node manifest is committed to this Python repo.
        run: >
          npx --yes
          -p semantic-release@^24
          -p @semantic-release/commit-analyzer@^13
          -p @semantic-release/release-notes-generator@^14
          -p @semantic-release/changelog@^6
          -p @semantic-release/exec@^7
          -p @semantic-release/git@^10
          -p @semantic-release/github@^11
          -p conventional-changelog-conventionalcommits@^8
          semantic-release

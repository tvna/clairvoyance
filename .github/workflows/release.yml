name: Release

# Semantic versioning via Release Please. Conventional-commit history on `main`
# is analyzed to compute the next semver. Release Please opens (or updates) a
# release PR; merging that PR creates the git tag and GitHub Release and bumps
# the version in plugin.json and marketplace.json. Tagging is gated behind the
# release PR review, consistent with the repository's no-auto-merge posture.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Run Release Please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7  # v5.0.0
        with:
          # A PAT or GitHub App token is required so the release PR triggers the
          # CI checks the main ruleset requires — PRs opened with GITHUB_TOKEN do
          # not start workflows. Falls back to GITHUB_TOKEN (the release PR opens,
          # but its required checks stay pending until RELEASE_PLEASE_TOKEN is
          # set as a repo secret). See docs/versioning.md.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
